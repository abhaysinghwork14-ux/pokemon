<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokemon UI</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    
    <div class="menu-btn">☰</div>
    <div class="theme-btn">☼</div>

 
    <div class="logo">
      <h1>Pokémon</h1>
    </div>

 
    <div class="top-bar">

      <div class="search-box">
        <div class="search-icon">⌕</div>
        <input type="text" placeholder="Search for a Pokémon..." />
      </div>

      <div class="filter-box">
        Filter by types (1)
      </div>

      <div class="sort-btn">
        ⇅
      </div>

    </div>

   
    <div class="cards">


      <div class="card card1">

        <div class="pokemon-number">#0908</div>
        <div class="type-icon">🍃</div>

        <div class="fav">♡</div>

        <div class="circle"></div>

        <img class="pokemon-img"
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/908.png"
          alt="pokemon">

        <div class="name">Meowscarada</div>

        <div class="type green">GRASS</div>

        <div class="arrow">→</div>

      </div>

   
      <div class="card card2">

        <div class="pokemon-number">#0624</div>
        <div class="type-icon">⚙</div>

        <div class="fav">♡</div>

        <div class="circle"></div>

        <img class="pokemon-img"
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/624.png"
          alt="pokemon">

        <div class="name">Pawniard</div>

        <div class="type gray">DARK / STEEL</div>

        <div class="arrow">→</div>

      </div>

    
      <div class="card card3">

        <div class="pokemon-number">#0229</div>
        <div class="type-icon">🔥</div>

        <div class="fav">♡</div>

        <div class="circle"></div>

        <img class="pokemon-img"
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/229.png"
          alt="pokemon">

        <div class="name">Houndoom</div>

        <div class="type orange">DARK / FIRE</div>

        <div class="arrow">→</div>

      </div>

    
      <div class="card card4">

        <div class="pokemon-number">#0686</div>
        <div class="type-icon">💧</div>

        <div class="fav">♡</div>

        <div class="circle"></div>

        <img class="pokemon-img"
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/686.png"
          alt="pokemon">

        <div class="name">Inkay</div>

        <div class="type blue">DARK / PSYCHIC</div>

        <div class="arrow">→</div>

      </div>

    </div>

 
    <div class="features">

      <div class="feature feature1">
        <div class="feature-icon icon-blue">◉</div>
        <h3>Explore</h3><br>
      
      </div>

      <div class="feature feature2">
        <div class="feature-icon icon-green">🍃</div>
        <h3>Filter</h3><br>
      
      </div>

      <div class="feature feature3">
        <div class="feature-icon icon-yellow">⭐</div>
        <h3>Collection</h3><br>
       
      </div>

      <div class="feature feature4">
        <div class="feature-icon icon-purple">♛</div>
        <h3>Stats</h3><br>
    
      </div>
      <footer>
        <div class="og-logo">
            <img class="pokeball" src="https://cdn-icons-png.flaticon.com/512/287/287272.png" alt="Pokeball" width="100">
        </div>
        <div class="footer">@ 2024 pokemon . ALL RIGHT RESERVED</div>
            
      </footer>

    </div>

  </div>

</body>
</html>
